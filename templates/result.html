<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結果 - リーダーシップクイズ</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            max-width: 560px;
            width: 100%;
            padding: 32px;
            text-align: center;
        }
        h1 {
            margin: 0 0 16px;
            font-size: 1.5rem;
        }
        .score {
            font-size: 3rem;
            font-weight: 700;
            color: #4f46e5;
            margin: 16px 0;
        }
        .message {
            color: #666;
            margin-bottom: 24px;
        }
        a {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>クイズ終了！</h1>
        <p class="message">あなたの結果</p>
        <p class="score">{{ score }} / {{ total }}</p>
        <p class="message">{{ total }} 問中 {{ score }} 問正解しました</p>
        <a href="{{ url_for('index') }}">もう一度挑戦</a>
    </div>
</body>
</html>
