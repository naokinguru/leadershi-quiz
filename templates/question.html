<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リーダーシップクイズ</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            max-width: 560px;
            width: 100%;
            padding: 32px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
        }
        .meta {
            color: #666;
            margin-bottom: 24px;
        }
        .question {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .option {
            display: block;
            margin-bottom: 12px;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .option:hover {
            border-color: #4f46e5;
            background: #f8f7ff;
        }
        .option input {
            margin-right: 10px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>リーダーシップクイズ</h1>
        <p class="meta">第 {{ num }} 問 / {{ total }} 問</p>

        <p class="question">{{ question.question }}</p>

        <form method="post" action="{{ url_for('answer', num=num - 1) }}">
            {% for key, text in question.options.items() %}
            <label class="option">
                <input type="radio" name="answer" value="{{ key }}" required>
                {{ key }}. {{ text }}
            </label>
            {% endfor %}
            <button type="submit">答える</button>
        </form>
    </div>
</body>
</html>
